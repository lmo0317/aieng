<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Chat API Test - Gemini 2.5 Flash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 80%;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
        }

        .message.assistant {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            margin-right: auto;
        }

        .message .role {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        .message .content {
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .status {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .status.info {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.success {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status.error {
            background: #ffebee;
            color: #d32f2f;
        }

        .status.warning {
            background: #fff3e0;
            color: #f57c00;
        }

        .settings {
            padding: 16px 20px;
            background: #f5f5f5;
            border-top: 1px solid #e0e0e0;
        }

        .settings label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #666;
        }

        .settings input[type="range"] {
            width: 100%;
            margin-bottom: 8px;
        }

        .settings .range-value {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
        }

        .typing-indicator {
            display: inline-block;
            padding: 8px 12px;
            background: white;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        .session-info {
            font-size: 12px;
            color: #666;
            padding: 8px 20px;
            background: #f5f5f5;
            border-top: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Gemini Chat API Test</h1>
            <p>Gemini 2.5 Flash 스트리밍 채팅 테스트 도구</p>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="role">Assistant</div>
                <div class="content">안녕하세요! Gemini 2.5 Flash 기반 AI 챗봇입니다. 무엇을 도와드릴까요?</div>
            </div>
        </div>

        <div class="input-container">
            <div id="status" class="status info">메시지를 입력하세요</div>

            <div class="input-group">
                <input
                    type="text"
                    id="messageInput"
                    placeholder="메시지를 입력하세요..."
                    autocomplete="off"
                >
                <button id="sendBtn" onclick="sendMessage()">전송</button>
            </div>

            <div class="controls">
                <button onclick="clearSession()" style="background: #f44336;">대화 초기화</button>
                <button onclick="showHistory()" style="background: #4caf50;">기록 보기</button>
            </div>
        </div>

        <div class="settings">
            <label>생성 온도 (Temperature): <span id="tempValue" class="range-value">0.7</span></label>
            <input
                type="range"
                id="temperature"
                min="0"
                max="1"
                step="0.1"
                value="0.7"
                oninput="updateTemperature()"
            >

            <label>최대 토큰 (Max Tokens): <span id="tokensValue" class="range-value">8192</span></label>
            <input
                type="range"
                id="maxTokens"
                min="256"
                max="8192"
                step="256"
                value="8192"
                oninput="updateMaxTokens()"
            >
        </div>

        <div class="session-info" id="sessionInfo">
            세션 ID: 새로운 세션이 생성됩니다
        </div>
    </div>

    <script>
        let currentSessionId = null;
        let isProcessing = false;

        // Enter 키로 메시지 전송
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !isProcessing) {
                sendMessage();
            }
        });

        // 온도 업데이트
        function updateTemperature() {
            const value = document.getElementById('temperature').value;
            document.getElementById('tempValue').textContent = value;
        }

        // 최대 토큰 업데이트
        function updateMaxTokens() {
            const value = document.getElementById('maxTokens').value;
            document.getElementById('tokensValue').textContent = value;
        }

        // 상태 메시지 표시
        function setStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.className = `status ${type}`;
            statusEl.textContent = message;
        }

        // 메시지 추가
        function addMessage(role, content) {
            const container = document.getElementById('chatContainer');
            const messageEl = document.createElement('div');
            messageEl.className = `message ${role === 'user' ? 'user' : 'assistant'}`;
            messageEl.innerHTML = `
                <div class="role">${role === 'user' ? 'You' : 'Assistant'}</div>
                <div class="content">${escapeHtml(content)}</div>
            `;
            container.appendChild(messageEl);
            container.scrollTop = container.scrollHeight;
        }

        // HTML 이스케이프
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 타이핑 인디케이터 표시
        function showTypingIndicator() {
            const container = document.getElementById('chatContainer');
            const indicatorEl = document.createElement('div');
            indicatorEl.id = 'typingIndicator';
            indicatorEl.className = 'message assistant';
            indicatorEl.innerHTML = `
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            container.appendChild(indicatorEl);
            container.scrollTop = container.scrollHeight;
        }

        // 타이핑 인디케이터 제거
        function hideTypingIndicator() {
            const indicatorEl = document.getElementById('typingIndicator');
            if (indicatorEl) {
                indicatorEl.remove();
            }
        }

        // 메시지 전송
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message || isProcessing) {
                return;
            }

            isProcessing = true;
            input.disabled = true;
            document.getElementById('sendBtn').disabled = true;

            // 사용자 메시지 표시
            addMessage('user', message);
            input.value = '';

            setStatus('응답 생성 중...', 'info');
            showTypingIndicator();

            try {
                const temperature = parseFloat(document.getElementById('temperature').value);
                const maxTokens = parseInt(document.getElementById('maxTokens').value);

                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        sessionId: currentSessionId,
                        temperature: temperature,
                        maxTokens: maxTokens
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // SSE 스트림 처리
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantMessage = '';
                let messageElement = null;

                hideTypingIndicator();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('event:')) {
                            const event = line.slice(6).trim();

                            if (event === 'session') {
                                // 다음 라인에서 데이터 읽기
                                continue;
                            } else if (event === 'start') {
                                setStatus('응답 생성 시작...', 'info');
                            } else if (event === 'chunk') {
                                setStatus('응답 수신 중...', 'info');
                            } else if (event === 'done') {
                                setStatus('응답 완료', 'success');
                                isProcessing = false;
                                input.disabled = false;
                                document.getElementById('sendBtn').disabled = false;
                                input.focus();
                            } else if (event === 'error') {
                                setStatus('오류 발생', 'error');
                                isProcessing = false;
                                input.disabled = false;
                                document.getElementById('sendBtn').disabled = false;
                            }
                        } else if (line.startsWith('data:')) {
                            try {
                                const data = JSON.parse(line.slice(5).trim());

                                if (data.sessionId) {
                                    currentSessionId = data.sessionId;
                                    document.getElementById('sessionInfo').textContent =
                                        `세션 ID: ${currentSessionId}`;
                                } else if (data.text) {
                                    assistantMessage += data.text;

                                    // 실시간 메시지 업데이트
                                    if (!messageElement) {
                                        const container = document.getElementById('chatContainer');
                                        messageElement = document.createElement('div');
                                        messageElement.className = 'message assistant';
                                        messageElement.innerHTML = `
                                            <div class="role">Assistant</div>
                                            <div class="content"></div>
                                        `;
                                        container.appendChild(messageElement);
                                    }

                                    const contentEl = messageElement.querySelector('.content');
                                    contentEl.textContent = assistantMessage;

                                    // 자동 스크롤
                                    const container = document.getElementById('chatContainer');
                                    container.scrollTop = container.scrollHeight;
                                } else if (data.code && data.message) {
                                    setStatus(`오류: ${data.message}`, 'error');
                                    isProcessing = false;
                                    input.disabled = false;
                                    document.getElementById('sendBtn').disabled = false;
                                }
                            } catch (e) {
                                console.error('JSON parse error:', e);
                            }
                        }
                    }
                }

            } catch (error) {
                console.error('Error:', error);
                hideTypingIndicator();
                setStatus(`오류: ${error.message}`, 'error');
                isProcessing = false;
                input.disabled = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        // 세션 초기화
        async function clearSession() {
            if (!currentSessionId) {
                setStatus('초기화할 세션이 없습니다.', 'warning');
                return;
            }

            try {
                const response = await fetch(`/api/chat/${currentSessionId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    currentSessionId = null;
                    document.getElementById('sessionInfo').textContent =
                        '세션 ID: 새로운 세션이 생성됩니다';
                    document.getElementById('chatContainer').innerHTML = `
                        <div class="message assistant">
                            <div class="role">Assistant</div>
                            <div class="content">대화가 초기화되었습니다. 새로운 대화를 시작할 수 있습니다!</div>
                        </div>
                    `;
                    setStatus('세션이 초기화되었습니다.', 'success');
                } else {
                    throw new Error('세션 초기화 실패');
                }
            } catch (error) {
                console.error('Error:', error);
                setStatus('세션 초기화 중 오류가 발생했습니다.', 'error');
            }
        }

        // 대화 기록 보기
        async function showHistory() {
            if (!currentSessionId) {
                setStatus('기록을 볼 세션이 없습니다.', 'warning');
                return;
            }

            try {
                const response = await fetch(`/api/chat/${currentSessionId}/history`);

                if (response.ok) {
                    const data = await response.json();
                    console.log('Conversation History:', data);

                    let historyText = `세션 ID: ${data.sessionId}\n\n`;
                    data.history.forEach((msg, index) => {
                        historyText += `${index + 1}. [${msg.role}] ${msg.content}\n\n`;
                    });

                    alert(historyText);
                    setStatus('기록을 콘솔에서 확인하세요.', 'success');
                } else {
                    throw new Error('기록 조회 실패');
                }
            } catch (error) {
                console.error('Error:', error);
                setStatus('기록 조회 중 오류가 발생했습니다.', 'error');
            }
        }
    </script>
</body>
</html>
