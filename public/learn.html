<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>학습 - Trend Eng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v=7">
    <script src="https://static.toss.im/tds/bridge/bridge.js"></script>
</head>
<body>
    <div class="container">

        <!-- 학습 섹션 -->
        <div id="learning-section">
            <div class="progress">오늘의 학습: <span id="current-count">0 / 0</span></div>
            <div id="content-card" class="card">
                <div class="ai-content-label">AI가 생성한 학습 콘텐츠입니다</div>
                <div class="english-container">
                    <div class="english-sentence" id="sentence-en">불러오는 중...</div>
                    <button id="tts-btn" class="tts-btn hidden" title="문장 읽기">🔊</button>
                </div>
                <div class="korean-sentence hidden" id="sentence-ko"></div>
                <div class="structure-section hidden" id="structure"></div>
                <div class="explanation-section hidden" id="explanation"></div>
                <div class="voca-section hidden" id="voca"></div>
            </div>
            <div class="controls">
                <button id="reveal-btn">정답 및 설명 보기</button>
                <button id="next-btn" class="hidden">다음 문장</button>
                <button id="finish-btn" class="hidden">오늘의 학습 완료!</button>
                <div class="quiz-start-controls">
                    <button id="start-quiz-btn" class="hidden">🎮 어휘 퀴즈 시작</button>
                    <button id="skip-to-quiz-btn" class="btn-text hidden">연습 없이 퀴즈 바로가기 ⚡</button>
                </div>
            </div>
        </div>

        <!-- 퀴즈 섹션 -->
        <div id="quiz-section" class="hidden">
            <div class="quiz-header">
                <h2>🎮 어휘 복습 퀴즈</h2>
                <div class="quiz-progress">문제: <span id="quiz-current-count">0 / 0</span> | 점수: <span id="quiz-score">0</span></div>
            </div>

            <div id="quiz-loading" class="quiz-loading hidden">
                <div class="spinner"></div>
                <p>AI가 맞춤형 퀴즈를 생성하고 있습니다...</p>
            </div>

            <div id="quiz-content" class="card hidden">
                <div class="quiz-question-type" id="quiz-type-label">유형</div>
                <div class="quiz-question" id="quiz-question">문제가 여기에 표시됩니다.</div>

                <div id="quiz-options" class="quiz-options hidden"></div>

                <div id="quiz-input-container" class="quiz-input-container hidden">
                    <div id="quiz-char-boxes" class="quiz-char-boxes"></div>
                    <button id="quiz-submit-btn" class="btn-primary">정답 확인</button>
                </div>

                <div id="quiz-feedback" class="quiz-feedback hidden"></div>
            </div>

            <div class="controls quiz-controls">
                <button id="quiz-next-btn" class="hidden">다음 문제</button>
                <button id="quiz-finish-btn" class="hidden">퀴즈 완료</button>
            </div>
        </div>
    </div>

<script src="/js/nav.js"></script>
    <script src="/js/learn.js"></script>
</body>
</html>
