<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>주제 입력 - Trend Eng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="header-section">
            <div class="nav-links">
                <a href="/" class="nav-link">🔥 <span>실시간 트렌드</span></a>
                <a href="/songs" class="nav-link">🎶 <span>팝송 학습</span></a>
                <a href="/topic" class="nav-link">✏️ <span>주제 입력</span></a>
                <a href="/chat" class="nav-link">💬 <span>AI 튜터</span></a>
                <a href="/puzzle" class="nav-link">🧩 <span>퍼즐</span></a>
                <a href="/settings.html" class="settings-link">⚙️</a>
                <a href="/auth/google" id="nav-auth-btn" class="nav-auth-btn">🔑 <span>로그인</span></a>
            </div>
        </div>

        <div id="topic-section">
            <div class="topic-page-header">
                <h2>✏️ 주제 입력 학습</h2>
                <p class="topic-subtitle">원하는 주제로 맞춤형 영어 학습을 시작하세요</p>
            </div>
            <div class="setup-container">
                <div class="setup-left">
                    <div class="input-group topic-group">
                        <label for="topic">학습 주제 및 세부 내용</label>
                        <textarea id="topic" placeholder="학습하고 싶은 주제나 관련 기사 전문을 입력하세요. 상세할수록 더 정확한 문장이 생성됩니다." rows="8"></textarea>
                    </div>
                    <div class="input-group">
                        <label for="difficulty">학습 난이도 선택</label>
                        <select id="difficulty">
                            <option value="level1">Level 1 (입문)</option>
                            <option value="level2">Level 2 (초급)</option>
                            <option value="level3" selected>Level 3 (중급)</option>
                            <option value="level4">Level 4 (고급)</option>
                            <option value="level5">Level 5 (심화)</option>
                        </select>
                    </div>
                    <button id="start-btn" class="start-btn">학습 시작 🚀</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/nav.js"></script>
    <script src="/js/topic.js"></script>
</body>
</html>
