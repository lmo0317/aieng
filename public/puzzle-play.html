<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>가로세로 영어퀴즈 - Trend Eng</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #f4f6f8;
            font-family: 'Noto Sans KR', sans-serif;
            color: #1a1a2e;
            height: 100dvh;
            height: 100vh; /* fallback */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 상단 헤더 */
        .top-bar {
            width: 100%;
            background: #fff;
            border-bottom: 1px solid #e4e6ea;
            padding: 0 12px;
            height: 44px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 50;
        }
        .top-bar .back-btn {
            font-size: 20px;
            color: #555;
            background: none;
            border: none;
            padding: 4px 8px 4px 0;
            cursor: pointer;
        }
        .top-bar .title {
            font-size: 14px;
            font-weight: 700;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 5px;
            overflow: hidden;
            white-space: nowrap;
        }
        .top-bar .title .badge {
            background: #03c75a;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .top-bar .progress-info { font-size: 12px; color: #888; flex-shrink: 0; }
        .top-bar .progress-info span { color: #03c75a; font-weight: 700; }
        .ai-badge {
            display: inline-flex; align-items: center;
            font-size: 9px; font-weight: 700;
            color: #5b5bd6; background: rgba(91,91,214,0.1);
            border: 1px solid rgba(91,91,214,0.25);
            border-radius: 999px; padding: 2px 6px;
            white-space: nowrap; flex-shrink: 0;
        }
        .ai-notice-bar {
            width: 100%; background: rgba(91,91,214,0.06);
            border-bottom: 1px solid rgba(91,91,214,0.2);
            padding: 8px 12px; font-size: 12px; color: #525278;
            display: flex; align-items: center; gap: 8px; flex-shrink: 0;
        }
        .ai-notice-bar .ai-notice-text { flex: 1; line-height: 1.4; }
        .ai-notice-bar button {
            background: none; border: none; color: #7272a0;
            cursor: pointer; font-size: 12px; padding: 2px 4px; flex-shrink: 0;
        }

        /* 메인 컨테이너 - 남은 높이를 꽉 채움 */
        .game-container {
            width: 100%;
            max-width: 480px;
            flex: 1;
            min-height: 0;
            padding: 6px 10px 6px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden;
        }

        /* 그리드 */
        .grid-section {
            background: #fff;
            border-radius: 10px;
            padding: 8px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
            display: flex;
            justify-content: center;
            flex-shrink: 0;
        }
        .puzzle-grid {
            display: grid;
            border: 2px solid #222;
            border-radius: 2px;
            overflow: hidden;
        }
        .cell {
            width: var(--cell-size, 36px);
            height: var(--cell-size, 36px);
            background: #fff;
            position: relative;
            border-right: 1px solid #ccc;
            border-bottom: 1px solid #ccc;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .cell.black { background: #e0e3e8; border-color: #d0d3d8; cursor: default; }
        .cell .letter {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; font-weight: 700; color: #1a1a2e;
            padding-top: 4px;
        }
        .cell .num {
            position: absolute; top: 1px; left: 2px;
            font-size: 8px; color: #555; font-weight: 700;
            pointer-events: none; line-height: 1;
        }

        /* 셀 상태 */
        .cell.hint-cell { background: #f0f8ff; }
        .cell.hint-cell .letter { color: #2563eb; }
        .cell.highlight-word { background: #d1fae5; outline: 1px solid #34d399; outline-offset: -1px; }
        .cell.active-cell { background: #a7f3d0 !important; outline: 2px solid #059669 !important; outline-offset: -2px; z-index: 5; }
        .cell.active-cell .letter { color: #064e3b; font-weight: 800; }
        .cell.word-correct { background: #dcfce7 !important; }
        .cell.word-correct .letter { color: #16a34a; font-weight: 800; }
        .cell.word-wrong { background: #fee2e2 !important; animation: shake 0.3s; }
        .cell.word-wrong .letter { color: #dc2626; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }

        /* 힌트 패널 - 한 줄 */
        .clue-panel {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
            padding: 8px 10px;
            flex-shrink: 0;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            flex-wrap: wrap;
        }
        .clue-dir-tag {
            background: #1a73e8;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 5px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .clue-text {
            font-size: 12px;
            color: #333;
            flex: 1;
            line-height: 1.4;
            min-width: 0;
        }
        .clue-text.empty { color: #bbb; }
        .clue-lang-toggle {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 7px;
            border-radius: 5px;
            border: 1px solid #e0e0e0;
            background: #f3f4f6;
            color: #555;
            cursor: pointer;
            flex-shrink: 0;
            font-family: inherit;
        }
        .clue-actions { display: flex; gap: 4px; flex-shrink: 0; margin-left: auto; }
        .btn-hint {
            padding: 4px 8px; font-size: 11px; font-weight: 700;
            border-radius: 6px; border: 1px solid #f59e0b;
            background: #fef3c7; color: #d97706; cursor: pointer; font-family: inherit;
        }
        .btn-check-word {
            padding: 4px 8px; font-size: 11px; font-weight: 700;
            border-radius: 6px; border: none;
            background: #1a73e8; color: #fff; cursor: pointer; font-family: inherit;
        }

        /* 알파벳 선택 패널 */
        .letter-panel {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
            padding: 8px;
            flex-shrink: 0;
        }
        .letter-panel-empty {
            text-align: center; color: #bbb; font-size: 12px; padding: 6px 0;
        }
        .letter-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }
        .key-btn {
            height: 40px;
            background: #f3f4f6;
            border: 1.5px solid #e5e7eb;
            border-radius: 9px;
            font-size: 18px;
            font-weight: 800;
            color: #1a1a2e;
            cursor: pointer;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 2px 0 #d1d5db;
            transition: transform 0.08s;
        }
        .key-btn:active {
            background: #dbeafe; border-color: #1a73e8;
            box-shadow: none; transform: translateY(2px);
        }
        .key-del {
            height: 36px;
            background: #fee2e2;
            border: 1.5px solid #fca5a5;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 700;
            color: #dc2626;
            cursor: pointer;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 2px 0 #fca5a5;
            transition: transform 0.08s;
        }
        .key-del:active { box-shadow: none; transform: translateY(2px); }

        /* 하단 버튼 */
        .bottom-bar { display: flex; gap: 6px; flex-shrink: 0; }
        .btn-reset {
            flex: 1; padding: 10px; border-radius: 9px;
            border: 1px solid #e4e6ea; background: #f7f8fa;
            color: #555; font-size: 13px; font-weight: 700;
            cursor: pointer; font-family: inherit;
        }
        .btn-check-all {
            flex: 1; padding: 10px; border-radius: 9px;
            border: none; background: #1a73e8;
            color: #fff; font-size: 13px; font-weight: 700;
            cursor: pointer; font-family: inherit;
        }

        /* 토스트 */
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 8px 20px; border-radius: 20px; color: #fff;
            font-size: 13px; font-weight: 700; display: none;
            z-index: 200; white-space: nowrap; box-shadow: 0 3px 12px rgba(0,0,0,0.2);
        }

        /* 완료 오버레이 */
        .complete-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 300;
            align-items: center; justify-content: center;
        }
        .complete-overlay.show { display: flex; }
        .complete-card {
            background: #fff; border-radius: 18px; padding: 32px 28px;
            text-align: center; max-width: 300px; width: 90%;
        }
        .complete-card .emoji { font-size: 44px; margin-bottom: 12px; }
        .complete-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .complete-card p { font-size: 13px; color: #888; margin-bottom: 20px; }
        .complete-card button {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: #1a73e8; color: #fff; font-size: 15px; font-weight: 700;
            cursor: pointer; font-family: inherit;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="back-btn" onclick="location.href='/puzzle'">‹</button>
        <div class="title">
            가로세로 영어퀴즈
            <span class="badge">QUIZ</span>
            <span class="ai-badge">AI 생성</span>
        </div>
        <div class="progress-info">완료 <span id="solved-count">0</span>/<span id="total-count">0</span></div>
    </div>

    <div class="game-container">

        <div class="grid-section">
            <div id="grid" class="puzzle-grid"></div>
        </div>

        <div class="clue-panel" id="clue-panel">
            <span class="clue-text empty" id="clue-text">단어를 선택하세요</span>
        </div>

        <div class="letter-panel">
            <div id="letter-grid" class="letter-grid">
                <div class="letter-panel-empty" style="grid-column:1/-1">셀을 선택하면 알파벳이 표시됩니다.</div>
            </div>
        </div>

        <div class="bottom-bar">
            <button class="btn-reset" onclick="location.reload()">초기화</button>
            <button class="btn-check-all" onclick="validateAll()">전체 확인</button>
        </div>

    </div>

    <div class="toast" id="toast"></div>

    <div class="complete-overlay" id="complete-overlay">
        <div class="complete-card">
            <div class="emoji">🎉</div>
            <h2>모두 완성!</h2>
            <p>모든 단어를 맞췄습니다!</p>
            <button onclick="location.reload()">다시 풀기</button>
        </div>
    </div>

    <script>
        let puzzleData = null;
        let activeWord = null;
        let activeCell = null;
        let cellMap = {};
        let cellValues = {};
        let solvedIds = new Set();
        let showKorean = false;

        /* ── 로드 ── */
        async function loadPuzzle() {
            const params = new URLSearchParams(location.search);
            const puzzleId = params.get('id');
            const dataUrl = params.get('data'); // 구버전 호환
            if (puzzleId) {
                try {
                    const res = await fetch(`/api/puzzles/${encodeURIComponent(puzzleId)}`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const { puzzle } = await res.json();
                    puzzleData = normalizeSchema(puzzle.data);
                } catch (e) {
                    showToast('로드 실패: ' + e.message, '#dc2626');
                    puzzleData = getDefaultPuzzle();
                }
            } else if (dataUrl) {
                try {
                    const url = dataUrl.startsWith('/') ? dataUrl : '/' + dataUrl;
                    const res = await fetch(url);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    puzzleData = normalizeSchema(await res.json());
                } catch (e) {
                    showToast('로드 실패: ' + e.message, '#dc2626');
                    puzzleData = getDefaultPuzzle();
                }
            } else {
                puzzleData = getDefaultPuzzle();
            }
            document.querySelector('.title').childNodes[0].textContent =
                (puzzleData.meta?.title || 'Untitled Puzzle') + ' ';
            initGrid();
        }

        function normalizeSchema(json) {
            const words = (json.words || []).map(w => ({
                id: w.id, number: w.number,
                answer: w.answer.toUpperCase(),
                clue: w.clue, clue_ko: w.clue_ko || '',
                direction: w.direction, x: w.startX, y: w.startY
            }));

            // 실제 단어가 차지하는 최대 좌표를 계산해 gridSize 자동 보정
            let maxCoord = Math.max(json.grid?.width || 10, json.grid?.height || 10);
            words.forEach(w => {
                const endX = w.direction === 'across' ? w.x + w.answer.length - 1 : w.x;
                const endY = w.direction === 'across' ? w.y : w.y + w.answer.length - 1;
                maxCoord = Math.max(maxCoord, endX + 1, endY + 1);
            });

            return {
                meta: json.meta || {},
                gridSize: maxCoord,
                gridWidth: json.grid?.width || 10,
                gridHeight: json.grid?.height || 10,
                words
            };
        }

        function getDefaultPuzzle() {
            return normalizeSchema({
                version: "1.0",
                meta: { id: "puzzle-20260321-001", title: "AI 기술 영어 퀴즈", date: "2026-03-21", category: "tech", difficulty: "medium" },
                grid: { width: 10, height: 10 },
                words: [
                    { id:"w1", number:1, answer:"GEMINI", clue:"Google's most capable AI model family.", clue_ko:"구글의 가장 강력한 AI 모델 패밀리.", direction:"across", startX:1, startY:1 },
                    { id:"w2", number:2, answer:"MIND",   clue:"The element that enables awareness.", clue_ko:"사람이 세상을 인식할 수 있게 하는 요소.", direction:"down",   startX:3, startY:1 },
                    { id:"w3", number:3, answer:"INDIA",  clue:"A large country in South Asia.", clue_ko:"세계 최대 인구를 보유한 남아시아의 대국.", direction:"across", startX:1, startY:4 },
                    { id:"w4", number:4, answer:"DATE",   clue:"A specific day of the month or year.", clue_ko:"숫자로 지정된 월 또는 연도의 날.", direction:"down",   startX:5, startY:3 }
                ]
            });
        }

        /* ── 그리드 초기화 ── */
        function initGrid() {
            const gridEl = document.getElementById('grid');
            cellMap = {}; cellValues = {}; solvedIds = new Set();
            activeWord = null; activeCell = null;

            // 셀 크기: 너비/높이 모두 고려
            // container max-width(480) + padding(20) + grid-section padding(16) + border(4) = 40px
            const containerW = Math.min(window.innerWidth, 480);
            const availW = containerW - 40;
            // 높이는 topbar(44) + padding(12) + clue(40) + letters(~96) + bottombar(38) + gaps(30) = 260
            const availH = window.innerHeight - 260;
            const maxFromW = Math.floor(availW / puzzleData.gridSize);
            const maxFromH = Math.floor(availH / puzzleData.gridSize);
            const cellSize = Math.min(maxFromW, maxFromH, 40);

            document.documentElement.style.setProperty('--cell-size', cellSize + 'px');
            gridEl.style.gridTemplateColumns = `repeat(${puzzleData.gridSize}, ${cellSize}px)`;
            gridEl.innerHTML = '';

            puzzleData.words.forEach(w => {
                for (let i = 0; i < w.answer.length; i++) {
                    const x = w.direction === 'across' ? w.x + i : w.x;
                    const y = w.direction === 'across' ? w.y : w.y + i;
                    const key = `${x},${y}`;
                    if (!cellMap[key]) cellMap[key] = { ans: w.answer[i], num: null, words: [], isHint: false };
                    if (i === 0 && !cellMap[key].num) cellMap[key].num = w.number;
                    cellMap[key].words.push(w);
                }
            });
            puzzleData.words.forEach(w => {
                const key = `${w.x},${w.y}`;
                if (cellMap[key]) cellMap[key].isHint = true;
            });

            for (let row = 0; row < puzzleData.gridSize; row++) {
                for (let col = 0; col < puzzleData.gridSize; col++) {
                    const key = `${col},${row}`;
                    const data = cellMap[key];
                    const cellEl = document.createElement('div');
                    cellEl.className = 'cell' + (data ? '' : ' black');
                    cellEl.dataset.x = col; cellEl.dataset.y = row;
                    if (data) {
                        cellEl.dataset.ans = data.ans;
                        if (data.num) {
                            const numEl = document.createElement('span');
                            numEl.className = 'num';
                            numEl.textContent = data.num;
                            cellEl.appendChild(numEl);
                        }
                        const letterEl = document.createElement('span');
                        letterEl.className = 'letter';
                        if (data.isHint) { letterEl.textContent = data.ans; cellEl.classList.add('hint-cell'); }
                        cellEl.appendChild(letterEl);
                        cellEl.addEventListener('click', () => onCellClick(col, row, data));
                    }
                    gridEl.appendChild(cellEl);
                }
            }

            document.getElementById('total-count').textContent = puzzleData.words.length;
            document.getElementById('solved-count').textContent = 0;
            updateCluePanel();
            buildLetterGrid(null);
        }

        /* ── 셀 클릭 ── */
        function onCellClick(x, y, data) {
            if (activeCell && activeCell.x === x && activeCell.y === y && data.words.length > 1) {
                const other = data.words.find(w => w !== activeWord) || data.words[0];
                selectWord(other, x, y);
            } else {
                const keep = activeWord && data.words.includes(activeWord) ? activeWord : data.words[0];
                selectWord(keep, x, y);
            }
            activeCell = { x, y };
            buildLetterGrid(data.isHint ? null : data.ans);
        }

        /* ── 단어 선택 ── */
        function selectWord(word, curX, curY) {
            activeWord = word;
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active-cell', 'highlight-word'));
            for (let i = 0; i < word.answer.length; i++) {
                const x = word.direction === 'across' ? word.x + i : word.x;
                const y = word.direction === 'across' ? word.y : word.y + i;
                const el = getCellEl(x, y);
                if (el) el.classList.add((x === curX && y === curY) ? 'active-cell' : 'highlight-word');
            }
            updateCluePanel();
        }

        /* ── 힌트 패널 업데이트 ── */
        function updateCluePanel() {
            const panel = document.getElementById('clue-panel');
            const textEl = document.getElementById('clue-text');
            panel.querySelectorAll('.clue-dir-tag, .clue-lang-toggle, .clue-actions').forEach(e => e.remove());

            if (!activeWord) {
                textEl.className = 'clue-text empty';
                textEl.textContent = '단어를 선택하세요';
                return;
            }

            const dirLabel = activeWord.direction === 'across' ? '가로' : '세로';
            const tag = document.createElement('span');
            tag.className = 'clue-dir-tag';
            tag.textContent = `${activeWord.number} ${dirLabel}`;
            panel.insertBefore(tag, textEl);

            textEl.className = 'clue-text';
            textEl.textContent = showKorean && activeWord.clue_ko ? activeWord.clue_ko : activeWord.clue;

            if (activeWord.clue_ko) {
                const toggle = document.createElement('button');
                toggle.className = 'clue-lang-toggle';
                toggle.textContent = showKorean ? 'EN' : '한';
                toggle.onclick = () => { showKorean = !showKorean; updateCluePanel(); };
                panel.insertBefore(toggle, textEl.nextSibling);
            }

            const actions = document.createElement('div');
            actions.className = 'clue-actions';
            actions.innerHTML = `
                <button class="btn-hint" onclick="revealActiveWord()">힌트</button>
                <button class="btn-check-word" onclick="validateActiveWord()">확인</button>
            `;
            panel.appendChild(actions);
        }

        /* ── 알파벳 그리드 빌드 ── */
        function buildLetterGrid(correctLetter) {
            const container = document.getElementById('letter-grid');
            container.innerHTML = '';

            if (!correctLetter) {
                container.innerHTML = '<div class="letter-panel-empty" style="grid-column:1/-1">셀을 선택하면 알파벳이 표시됩니다.</div>';
                return;
            }

            const pool = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').filter(c => c !== correctLetter);
            shuffle(pool);
            const choices = [correctLetter, ...pool.slice(0, 9)];
            shuffle(choices);

            choices.forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'key-btn';
                btn.textContent = letter;
                btn.addEventListener('click', () => enterLetter(letter));
                container.appendChild(btn);
            });

            const delBtn = document.createElement('button');
            delBtn.className = 'key-del';
            delBtn.style.gridColumn = '1 / -1';
            delBtn.textContent = '⌫  지우기';
            delBtn.addEventListener('click', deleteLetter);
            container.appendChild(delBtn);
        }

        /* ── 글자 입력 / 삭제 ── */
        function enterLetter(letter) {
            if (!activeCell) return;
            const { x, y } = activeCell;
            const data = cellMap[`${x},${y}`];
            if (!data || data.isHint) return;
            setCellValue(x, y, letter);
            const next = getNextEmptyCell(x, y);
            if (next) {
                activeCell = next;
                selectWord(activeWord, next.x, next.y);
                buildLetterGrid(cellMap[`${next.x},${next.y}`].ans);
            }
        }

        function deleteLetter() {
            if (!activeCell) return;
            const { x, y } = activeCell;
            const data = cellMap[`${x},${y}`];
            if (!data || data.isHint) return;
            if (getCellValue(x, y)) {
                setCellValue(x, y, '');
            } else {
                const prev = getPrevCell(x, y);
                if (prev) {
                    activeCell = prev;
                    selectWord(activeWord, prev.x, prev.y);
                    setCellValue(prev.x, prev.y, '');
                    buildLetterGrid(cellMap[`${prev.x},${prev.y}`].ans);
                }
            }
        }

        /* ── 셀 이동 헬퍼 ── */
        function getWordCells(word) {
            return Array.from({ length: word.answer.length }, (_, i) => ({
                x: word.direction === 'across' ? word.x + i : word.x,
                y: word.direction === 'across' ? word.y : word.y + i
            }));
        }

        function getNextEmptyCell(curX, curY) {
            if (!activeWord) return null;
            const cells = getWordCells(activeWord);
            const idx = cells.findIndex(c => c.x === curX && c.y === curY);
            for (let i = idx + 1; i < cells.length; i++) {
                const c = cells[i];
                if (!cellMap[`${c.x},${c.y}`].isHint && !getCellValue(c.x, c.y)) return c;
            }
            for (let i = 0; i < idx; i++) {
                const c = cells[i];
                if (!cellMap[`${c.x},${c.y}`].isHint && !getCellValue(c.x, c.y)) return c;
            }
            return null;
        }

        function getPrevCell(curX, curY) {
            if (!activeWord) return null;
            const cells = getWordCells(activeWord);
            const idx = cells.findIndex(c => c.x === curX && c.y === curY);
            for (let i = idx - 1; i >= 0; i--) {
                if (!cellMap[`${cells[i].x},${cells[i].y}`].isHint) return cells[i];
            }
            return null;
        }

        /* ── 셀 값 ── */
        function getCellEl(x, y) { return document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`); }
        function getCellValue(x, y) {
            const d = cellMap[`${x},${y}`];
            return (d && d.isHint) ? d.ans : (cellValues[`${x},${y}`] || '');
        }
        function setCellValue(x, y, char) {
            cellValues[`${x},${y}`] = char;
            const el = getCellEl(x, y);
            if (el) {
                el.querySelector('.letter').textContent = char;
                el.classList.remove('word-correct', 'word-wrong');
            }
        }

        /* ── 검증 ── */
        function validateWord(id) {
            const w = puzzleData.words.find(word => word.id === id);
            let ok = true;
            const cells = [];
            for (let i = 0; i < w.answer.length; i++) {
                const x = w.direction === 'across' ? w.x + i : w.x;
                const y = w.direction === 'across' ? w.y : w.y + i;
                cells.push(getCellEl(x, y));
                if (getCellValue(x, y) !== w.answer[i]) ok = false;
            }
            cells.forEach(c => {
                if (!c) return;
                c.classList.remove('word-correct', 'word-wrong');
                void c.offsetWidth;
                c.classList.add(ok ? 'word-correct' : 'word-wrong');
            });
            if (ok) {
                solvedIds.add(id);
                document.getElementById('solved-count').textContent = solvedIds.size;
                showToast('정답! 🎉', '#16a34a');
                if (solvedIds.size === puzzleData.words.length)
                    setTimeout(() => document.getElementById('complete-overlay').classList.add('show'), 800);
            } else {
                showToast('틀렸습니다', '#dc2626');
            }
            return ok;
        }

        function validateActiveWord() { if (activeWord) validateWord(activeWord.id); }
        function validateAll() {
            let all = true;
            puzzleData.words.forEach(w => { if (!solvedIds.has(w.id) && !validateWord(w.id)) all = false; });
            if (all) showToast('전부 정답! 🎉', '#16a34a');
        }

        /* ── 힌트 채우기 ── */
        function revealWord(id) {
            const w = puzzleData.words.find(word => word.id === id);
            for (let i = 0; i < w.answer.length; i++) {
                const x = w.direction === 'across' ? w.x + i : w.x;
                const y = w.direction === 'across' ? w.y : w.y + i;
                if (!cellMap[`${x},${y}`].isHint) setCellValue(x, y, w.answer[i]);
            }
            validateWord(id);
        }
        function revealActiveWord() { if (activeWord) revealWord(activeWord.id); }

        /* ── 유틸 ── */
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function showToast(msg, color) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.background = color; t.style.display = 'block';
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.style.display = 'none', 1800);
        }

        window.addEventListener('load', loadPuzzle);
        let _lastW = window.innerWidth;
        window.addEventListener('resize', () => {
            if (puzzleData && window.innerWidth !== _lastW) { _lastW = window.innerWidth; initGrid(); }
        });
    </script>
    <script>
        // AI 사용 공시 — 첫 진입 시 (Toss Apps in Toss 정책)
        (function() {
            const KEY = 'trendeng_ai_notice_v1';
            if (localStorage.getItem(KEY)) return;
            const bar = document.createElement('div');
            bar.className = 'ai-notice-bar';
            bar.innerHTML = '<span>🤖</span><span class="ai-notice-text">이 서비스는 <strong>AI(인공지능)</strong>를 활용하여 영어 학습 콘텐츠(퍼즐 포함)를 자동 생성합니다.</span><button aria-label="닫기">✕</button>';
            bar.querySelector('button').addEventListener('click', () => {
                bar.remove();
                localStorage.setItem(KEY, '1');
            });
            const topBar = document.querySelector('.top-bar');
            if (topBar) topBar.insertAdjacentElement('afterend', bar);
        })();
    </script>
