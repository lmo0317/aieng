<canvas id="c" width="1932" height="828" style="display:none"></canvas>
<script>
function dl() {
  const svg = document.getElementById('thumb');
  // Clone and set full resolution
  const clone = svg.cloneNode(true);
  clone.setAttribute('width', '1932');
  clone.setAttribute('height', '828');
  const c = document.getElementById('c');
  const ctx = c.getContext('2d');
  const blob = new Blob([new XMLSerializer().serializeToString(clone)], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    ctx.clearRect(0,0,1932,828);
    ctx.drawImage(img,0,0,1932,828);
    URL.revokeObjectURL(url);
    Object.assign(document.createElement('a'),{
      download:'trend-eng-thumbnail-1932x828.png',
      href:c.toDataURL('image/png')
    }).click();
  };
  img.src = url;
}
</script>
