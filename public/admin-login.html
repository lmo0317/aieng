<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관리자 로그인 - Trend Eng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5fa;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .login-box {
            background: #fff;
            border: 1px solid #e0e0ee;
            border-radius: 18px;
            padding: 40px 36px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 8px 32px rgba(91,91,214,0.10), 0 2px 8px rgba(0,0,0,0.06);
        }
        .login-logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            color: #5b5bd6;
            margin-bottom: 4px;
        }
        .login-title {
            font-size: 0.9rem;
            color: #7272a0;
            margin-bottom: 32px;
        }
        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #525278;
            margin-bottom: 6px;
        }
        input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #e0e0ee;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #1a1a2e;
            background: #f8f8fc;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input[type="password"]:focus {
            border-color: #5b5bd6;
            box-shadow: 0 0 0 3px rgba(91,91,214,0.12);
            background: #fff;
        }
        .error-msg {
            font-size: 0.8rem;
            color: #c53030;
            background: rgba(197,48,48,0.07);
            border: 1px solid rgba(197,48,48,0.2);
            border-radius: 8px;
            padding: 8px 12px;
            margin-top: 12px;
            display: none;
        }
        .error-msg.show { display: block; }
        button[type="submit"] {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #5b5bd6;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        button[type="submit"]:hover { background: #4a4ac4; }
        button[type="submit"]:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo">Trend Eng</div>
        <div class="login-title">관리자 페이지에 접근하려면 비밀번호를 입력하세요.</div>
        <form method="POST" action="/api/admin/login">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="••••••••" autofocus autocomplete="current-password">
            <div id="error-msg" class="error-msg">비밀번호가 올바르지 않습니다.</div>
            <button type="submit">로그인</button>
        </form>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('error') === '1') {
            document.getElementById('error-msg').classList.add('show');
        }
    </script>
</body>
</html>
