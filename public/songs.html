<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>팝송 학습 - Trend Eng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="https://static.toss.im/tds/bridge/bridge.js"></script>

<body>
    <div class="container">
        <!-- 토스 표준 헤더 -->

            <div class="toss-header-center">
                <h1 class="toss-header-title">트렌드 잉글리시</h1>
            </div>
        </div>

        <div id="songs-section">
            <div class="trends-page-header">

            </div>

                    <p>데이터 관리 페이지에서 새로운 팝송을 추가해보세요!</p>

                </div>
            </div>
        </div>

        <!-- 하단 플로팅 탭바 -->
        <div class="floating-tabbar">
            <div class="nav-links">
                <a href="/" class="nav-link"><span>트렌드</span></a>
                <a href="/songs" class="nav-link"><span>팝송</span></a>
                <a href="/puzzle" class="nav-link"><span>퍼즐</span></a>
