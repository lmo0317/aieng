<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>퍼즐 - Trend Eng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .puzzle-page-header { text-align: center; padding: 32px 0 24px; }
        .puzzle-page-header h2 { font-size: 1.6rem; font-weight: 800; margin: 0 0 6px; }
        .puzzle-page-header p { color: #888; font-size: 0.9rem; margin: 0; }

        .puzzle-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-width: 680px;
            margin: 0 auto;
            padding: 0 16px 40px;
        }

        .puzzle-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px 22px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            border: 1.5px solid #f0f0f0;
            transition: all 0.18s;
            text-decoration: none;
            color: inherit;
        }
        .puzzle-card:hover {
            border-color: #6366f1;
            box-shadow: 0 4px 20px rgba(99,102,241,0.12);
            transform: translateY(-2px);
        }

        .puzzle-card-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .puzzle-card-body { flex: 1; min-width: 0; }
        .puzzle-card-title {
            font-size: 15px;
            font-weight: 700;
            margin: 0 0 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .puzzle-card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .badge {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 20px;
        }
        .badge-diff-easy   { background: #dcfce7; color: #16a34a; }
        .badge-diff-medium { background: #dbeafe; color: #1d4ed8; }
        .badge-diff-hard   { background: #fef3c7; color: #d97706; }
        .badge-cat { background: #f3f4f6; color: #555; }

        .puzzle-card-info {
            font-size: 12px;
            color: #aaa;
            margin-top: 4px;
        }

        .puzzle-card-arrow {
            color: #ccc;
            font-size: 20px;
            flex-shrink: 0;
        }
        .puzzle-card:hover .puzzle-card-arrow { color: #6366f1; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; }

        .loading { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <div class="nav-links">
                <a href="/" class="nav-link">🔥 <span>실시간 트렌드</span></a>
                <a href="/songs" class="nav-link">🎶 <span>팝송 학습</span></a>
                <a href="/topic" class="nav-link">✏️ <span>주제 입력</span></a>
                <a href="/chat" class="nav-link">💬 <span>AI 튜터</span></a>
                <a href="/puzzle" class="nav-link active">🧩 <span>퍼즐</span></a>
                <a href="/settings.html" class="settings-link">⚙️</a>
            </div>
        </div>

        <div class="puzzle-page-header">
            <h2>🧩 가로세로 영어 퀴즈</h2>
            <p>영단어 퍼즐을 풀며 영어를 학습해보세요</p>
        </div>

        <div id="puzzle-list" class="puzzle-list">
            <div class="loading">퍼즐 목록을 불러오는 중...</div>
        </div>
    </div>

    <script src="/js/nav.js"></script>
    <script>
        const CATEGORY_ICON = {
            tech:          { icon: '💻', bg: '#ede9fe', color: '#7c3aed' },
            sports:        { icon: '⚽', bg: '#dcfce7', color: '#16a34a' },
            entertainment: { icon: '🎬', bg: '#fce7f3', color: '#db2777' },
            politics:      { icon: '🏛️', bg: '#e0f2fe', color: '#0284c7' },
            economy:       { icon: '📈', bg: '#fef9c3', color: '#ca8a04' },
            popsong:       { icon: '🎵', bg: '#fce7f3', color: '#db2777' },
            general:       { icon: '📰', bg: '#f3f4f6', color: '#555' },
        };
        const DIFF_LABEL = { easy: '초급', medium: '중급', hard: '고급' };

        async function loadList() {
            const container = document.getElementById('puzzle-list');
            try {
                const res = await fetch('/puzzle-data/index.json');
                if (!res.ok) throw new Error('index.json not found');
                const { puzzles } = await res.json();

                if (!puzzles || puzzles.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">🧩</div>
                            <p>아직 퍼즐이 없습니다.<br>스킬로 퍼즐을 생성해보세요!</p>
                        </div>`;
                    return;
                }

                container.innerHTML = '';
                // 최신순 정렬
                puzzles.sort((a, b) => b.date.localeCompare(a.date));

                puzzles.forEach(p => {
                    const cat = CATEGORY_ICON[p.category] || CATEGORY_ICON.general;
                    const diffClass = `badge-diff-${p.difficulty || 'medium'}`;
                    const diffLabel = DIFF_LABEL[p.difficulty] || '중급';

                    const card = document.createElement('a');
                    card.className = 'puzzle-card';
                    card.href = `/puzzle/play?data=puzzle-data/${p.file}`;
                    card.innerHTML = `
                        <div class="puzzle-card-icon" style="background:${cat.bg};">${cat.icon}</div>
                        <div class="puzzle-card-body">
                            <div class="puzzle-card-title">${p.title}</div>
                            <div class="puzzle-card-meta">
                                <span class="badge ${diffClass}">${diffLabel}</span>
                                <span class="badge badge-cat">${p.category}</span>
                                ${p.wordCount ? `<span class="badge badge-cat">단어 ${p.wordCount}개</span>` : ''}
                            </div>
                            <div class="puzzle-card-info">
                                ${p.date}${p.source ? ' · ' + p.source : ''}
                            </div>
                        </div>
                        <div class="puzzle-card-arrow">›</div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <p>퍼즐 목록을 불러올 수 없습니다.</p>
                    </div>`;
            }
        }

        loadList();
    </script>
</body>
</html>
