<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>퍼즐 - Trend Eng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="header-section">
            <div class="nav-links">
                <a href="/" class="nav-link">🔥 <span>실시간 트렌드</span></a>
                <a href="/songs" class="nav-link">🎶 <span>팝송 학습</span></a>
                <a href="/puzzle" class="nav-link active">🧩 <span>퍼즐</span></a>
                <button id="admin-toggle-btn" class="settings-link" style="display:none" title="관리자 메뉴">🧑‍💼</button>
                <a href="/auth/google" id="nav-auth-btn" class="nav-auth-btn">🔑 <span>로그인</span></a>
            </div>
            <div id="admin-submenu" class="admin-submenu hidden">

            </div>
        </div>

        <div id="puzzle-section">
            <div class="trends-page-header">

            </div>
            <div id="puzzle-container" class="realtime-trends-container">
                <div class="trends-empty-state">
                    <div class="empty-icon">🧩</div>
                    <h3>아직 퍼즐이 없습니다</h3>
                    <p>스킬로 퍼즐을 생성해보세요!</p>
                </div>
            </div>

    <script src="/js/nav.js"></script>
    <script src="/js/puzzle.js"></script>
