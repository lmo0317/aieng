<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>접근 권한 없음 - Trend Eng</title>
    <link rel="stylesheet" href="/style.css?v=2">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            gap: 16px;
        }
        .error-icon { font-size: 4rem; }
        .error-title { font-size: 1.5rem; font-weight: 700; color: var(--text-1); }
        .error-desc { color: var(--text-3); font-size: 0.95rem; }
        .error-btn {
            margin-top: 8px;
            padding: 10px 24px;
            background: var(--accent);
            color: #fff;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .error-btn:hover { background: var(--accent-hover); }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-container">
            <div class="error-icon">🔒</div>
            <div class="error-title">접근 권한이 없습니다</div>
            <div class="error-desc">관리자 계정으로 로그인해야 접근할 수 있는 페이지입니다.</div>
            <a href="/" class="error-btn">홈으로 돌아가기</a>
        </div>
    </div>
</body>
</html>
