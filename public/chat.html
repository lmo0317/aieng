<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 튜터 - Trend Eng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="header-section">
            <div class="nav-links">
                <a href="/" class="nav-link">🔥 <span>실시간 트렌드</span></a>
                <a href="/songs" class="nav-link">🎶 <span>팝송 학습</span></a>
                <a href="/topic" class="nav-link">✏️ <span>주제 입력</span></a>
                <a href="/chat" class="nav-link">💬 <span>AI 튜터</span></a>
                <a href="/puzzle" class="nav-link">🧩 <span>퍼즐</span></a>
                <a href="/settings.html" class="settings-link">⚙️</a>
            </div>
        </div>

        <!-- 선생님 선택 -->
        <div id="teacher-selection" class="teacher-selection ts-page">
            <div class="ts-inner">
                <h3 class="ts-title">튜터를 선택하세요</h3>
                <p class="ts-subtitle">학습 스타일에 맞는 선생님과 시작해요</p>
                <div class="teacher-cards">
                    <div class="teacher-card" data-teacher="korean">
                        <div class="tc-flag">🇰🇷</div>
                        <h4 class="tc-name">Sophie</h4>
                        <p class="tc-desc">한국어로 친절하게 설명해드려요</p>
                        <ul class="tc-list">
                            <li>한국어 설명 & 번역 제공</li>
                            <li>체계적인 문법 지도</li>
                            <li>격려하는 친절한 스타일</li>
                        </ul>
                        <button class="teacher-select-btn ts-btn-kor">Sophie와 시작하기</button>
                    </div>
                    <div class="teacher-card" data-teacher="native">
                        <div class="tc-flag">🇺🇸</div>
                        <h4 class="tc-name">Alex</h4>
                        <p class="tc-desc">영어로만 대화하며 실력을 키워요</p>
                        <ul class="tc-list">
                            <li>원어민 영어 100% 대화</li>
                            <li>자연스러운 표현 교정</li>
                            <li>실전 회화 집중 훈련</li>
                        </ul>
                        <button class="teacher-select-btn ts-btn-nat">Alex와 시작하기</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 채팅 인터페이스 -->
        <div id="chat-interface" class="chat-page-interface hidden">
            <div class="chat-page-header">
                <div class="chat-page-header-left">
                    <button id="change-teacher-btn" class="change-teacher-btn">← 선생님 변경</button>
                </div>
                <div class="chat-page-header-center">
                    <div class="chat-header-avatar" id="chat-header-avatar"></div>
                    <div>
                        <div id="chat-teacher-name" class="chat-page-teacher-name"></div>
                        <div class="chat-status-indicator hidden" id="chat-status-indicator">
                            <span class="status-dot"></span>
                            <span class="status-text" id="chat-status-text">연결 중...</span>
                        </div>
                    </div>
                </div>
                <div class="chat-page-header-right"></div>
            </div>

            <div id="chat-messages" class="chat-page-messages">
                <div class="chat-welcome-message" id="chat-welcome">
                    안녕하세요! 무엇이든 물어보세요.
                </div>
            </div>

            <div class="chat-page-input-area">
                <div class="chat-input-wrapper">
                    <input type="text" id="chat-input" class="chat-input" placeholder="메시지를 입력하세요..." aria-label="메시지 입력">
                    <button id="chat-send-btn" class="chat-send-btn" aria-label="메시지 전송">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/nav.js"></script>
    <script src="/js/chat-page.js"></script>
</body>
</html>
