<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>관리자 - Trend Eng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v=2">
    <style>
        .admin-page-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 28px 0 20px;
        }
        .admin-page-header .page-header-icon {
            font-size: 2rem;
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-dim);
            border-radius: var(--r-md);
        }
        .admin-page-header h2 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-1);
        }
        .admin-page-header p {
            margin: 2px 0 0;
            font-size: 0.85rem;
            color: var(--text-3);
        }
        .admin-menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 8px;
        }
        .admin-menu-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            padding: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            text-decoration: none;
            color: var(--text-1);
            transition: box-shadow 0.15s, border-color 0.15s, transform 0.15s;
            box-shadow: var(--shadow-sm);
        }
        .admin-menu-card:hover {
            border-color: var(--accent-border);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .admin-menu-card .card-icon {
            font-size: 1.6rem;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-dim);
            border-radius: var(--r-sm);
        }
        .admin-menu-card .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-1);
        }
        .admin-menu-card .card-desc {
            font-size: 0.78rem;
            color: var(--text-3);
            line-height: 1.4;
        }
        .admin-section-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin: 20px 0 8px;
        }
        .admin-section-label.first {
            margin-top: 8px;
        }
        .beta-badge {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--accent);
            background: var(--accent-dim);
            border: 1px solid var(--accent-border);
            border-radius: var(--r-full);
            padding: 1px 7px;
            margin-left: 6px;
            vertical-align: middle;
            letter-spacing: 0.03em;
        }
        .logout-btn {
            font-size: 0.8rem;
            color: var(--text-3);
            text-decoration: none;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: var(--r-full);
            transition: color 0.15s, border-color 0.15s;
            white-space: nowrap;
        }
        .logout-btn:hover {
            color: var(--red);
            border-color: var(--red);
        }
        @media (max-width: 480px) {
            .admin-menu-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <div class="nav-links">
                <a href="/" class="nav-link"><span>트렌드</span></a>
                <a href="/punchline" class="nav-link"><span>명대사</span></a>
                <a href="/puzzle" class="nav-link"><span>퍼즐</span></a>
            </div>
        </div>

        <div class="admin-page-header">
            <div class="page-header-icon">⚙️</div>
            <div style="flex:1">
                <h2>관리자</h2>
                <p>Trend Eng 관리 도구 모음</p>
            </div>
            <a href="/admin/logout" class="logout-btn">로그아웃</a>
        </div>

        <div class="admin-section-label first">관리</div>
        <div class="admin-menu-grid">
            <a href="/settings.html" class="admin-menu-card">
                <div class="card-icon">🤖</div>
                <div class="card-title">AI 세팅</div>
                <div class="card-desc">API 키, AI 모델, 시스템 프롬프트 관리</div>
            </a>
            <a href="/data.html" class="admin-menu-card">
                <div class="card-icon">📊</div>
                <div class="card-title">데이터 관리</div>
                <div class="card-desc">뉴스 트렌드, 팝송, 퍼즐 데이터 수집 및 관리</div>
            </a>
        </div>

        <div class="admin-section-label">베타 테스트 <span class="beta-badge">BETA</span></div>
        <div class="admin-menu-grid">
            <a href="/topic" class="admin-menu-card">
                <div class="card-icon">✏️</div>
                <div class="card-title">주제 입력</div>
                <div class="card-desc">직접 주제를 입력하여 학습 콘텐츠 생성</div>
            </a>
            <a href="/chat" class="admin-menu-card">
                <div class="card-icon">💬</div>
                <div class="card-title">AI 튜터</div>
                <div class="card-desc">AI 튜터와 영어 대화 연습</div>
            </a>
        </div>
    </div>

    <script src="/js/nav.js"></script>
</body>
</html>
