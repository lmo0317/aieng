<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터 관리 - 트렌드 영어</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../settings.css">
    <style>
        .data-card {
            background: var(--surface);
            padding: 1.75rem;
            border-radius: var(--r-lg);
            border: 1px solid var(--border-2);
            text-align: left;
            margin-top: 1rem;
        }
        .data-info {
            margin-bottom: 1.25rem;
            padding: 0.9rem 1.1rem;
            background: var(--accent-dim);
            border-radius: var(--r-md);
            color: var(--text-1);
            font-size: 0.92rem;
            line-height: 1.6;
            border: 1px solid var(--accent-border);
        }
        .data-card h3 {
            font-family: var(--font-ui);
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-1) !important;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: var(--surface-dim);
            border-radius: var(--r-md);
            border: 1px solid var(--border-1);
            transition: all 0.2s ease;
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item-title {
            font-weight: 700;
            color: var(--text-1);
        }

        .item-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.5rem 1rem;
            border-radius: var(--r-md);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
            transform: translateY(-2px);
        }

        .btn-clear {
            background: #f59e0b;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: var(--r-md);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header-section">
            <div class="nav-links">
                <a href="/admin" class="nav-link">📰 뉴스 생성</a>
                <a href="/admin/data" class="nav-link active">🗑️ 리스트 삭제</a>
                <a href="/admin/songs" class="nav-link">🎵 팝송 추가</a>
            </div>
        </div>

        <div class="settings-page-header">
            <h2>🗑️ 리스트 삭제</h2>
            <p>aieng.cafe24app.com 서버의 학습 콘텐츠를 조회하고 삭제할 수 있습니다</p>
        </div>

        <div id="section-manage">
            <div class="data-card">
                <h3 style="margin-bottom: 1rem; color: #7c3aed;">🎶 저장된 팝송 관리</h3>
                <div id="manage-songs-list" style="display: flex; flex-direction: column; gap: 10px;">
                    <p style="text-align: center; color: var(--text-muted); padding: 20px;">로딩 중...</p>
                </div>
            </div>

            <div class="data-card" style="margin-top: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3 style="margin: 0; color: var(--primary);">📰 뉴스 트렌드 관리</h3>
                    <button id="clearTodayBtn" class="btn-clear">오늘 데이터 전체 삭제</button>
                </div>
                <div id="manage-trends-list" style="display: flex; flex-direction: column; gap: 10px;">
                    <p style="text-align: center; color: var(--text-muted); padding: 20px;">로딩 중...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
</body>

</html>
