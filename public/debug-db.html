<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB 디버그</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .result { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-info { background: #3498db; color: white; }
    </style>
</head>
<body>
    <h1>🔍 데이터베이스 디버그 도구</h1>

    <div style="margin-bottom: 20px;">
        <button class="btn-info" onclick="checkDatabase()">1. 데이터베이스 전체 확인</button>
        <button class="btn-danger" onclick="clearTodayData()">2. 오늘 데이터 삭제</button>
        <button class="btn-success" onclick="importJSON()">3. JSON에서 가져오기</button>
        <button class="btn-info" onclick="checkResult()">4. 가져온 후 확인</button>
    </div>

    <div id="result" class="result"></div>

    <script>
        async function checkDatabase() {
            const result = document.getElementById('result');
            result.innerHTML = '확인 중...';

            try {
                const response = await fetch('/api/trends/saved');
                const data = await response.json();
                const trends = data.trends || [];

                let html = '<h3>현재 데이터베이스 상태:</h3>';
                html += '<p><strong>총 ' + trends.length + '개의 뉴스</strong></p>';
                html += '<table><tr><th>ID</th><th>제목</th><th>카테고리</th><th>타입</th><th>날짜</th></tr>';

                trends.forEach(trend => {
                    html += '<tr>';
                    html += '<td>' + trend.id + '</td>';
                    html += '<td>' + trend.title.substring(0, 30) + '...</td>';
                    html += '<td><strong>' + (trend.category || '(empty)') + '</strong></td>';
                    html += '<td>' + trend.type + '</td>';
                    html += '<td>' + trend.date + '</td>';
                    html += '</tr>';
                });

                html += '</table>';
                result.innerHTML = html;
            } catch (error) {
                result.innerHTML = '<p style="color: red;">에러: ' + error.message + '</p>';
            }
        }

        async function clearTodayData() {
            const result = document.getElementById('result');

            const today = new Date().toISOString().split('T')[0];
            if (!confirm('오늘 날짜(' + today + ')의 모든 뉴스 데이터를 삭제하시겠습니까?')) {
                return;
            }

            result.innerHTML = '삭제 중...';

            try {
                const response = await fetch('/api/trends/clear-today', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ date: today })
                });

                const data = await response.json();

                if (data.success) {
                    result.innerHTML = '<p style="color: green;">✅ 성공! ' + data.deleted + '개의 데이터가 삭제되었습니다.</p>';
                } else {
                    result.innerHTML = '<p style="color: red;">❌ 실패: ' + data.error + '</p>';
                }
            } catch (error) {
                result.innerHTML = '<p style="color: red;">에러: ' + error.message + '</p>';
            }
        }

        async function importJSON() {
            const result = document.getElementById('result');
            result.innerHTML = '가져오는 중...';

            try {
                const response = await fetch('/api/trends/import-json', {
                    method: 'POST'
                });

                const data = await response.json();

                if (data.success) {
                    result.innerHTML = '<p style="color: green;">✅ 성공! ' + data.imported + '개의 뉴스가 가져와졌습니다.</p>';
                } else {
                    result.innerHTML = '<p style="color: red;">❌ 실패: ' + data.error + '</p>';
                }
            } catch (error) {
                result.innerHTML = '<p style="color: red;">에러: ' + error.message + '</p>';
            }
        }

        async function checkResult() {
            // 가져온 후 다시 확인
            await checkDatabase();
        }
    </script>
</body>
</html>
