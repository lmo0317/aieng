<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뉴스 JSON 가져오기 테스트</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 20px; font-size: 24px; }
        .upload-area { border: 2px dashed #ddd; padding: 40px; text-align: center; border-radius: 8px; margin-bottom: 20px; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { border-color: #007bff; background: #f8f9fa; }
        .upload-area.dragover { border-color: #007bff; background: #e7f3ff; }
        .upload-icon { font-size: 48px; color: #999; margin-bottom: 10px; }
        .upload-text { color: #666; margin-bottom: 10px; }
        .upload-hint { color: #999; font-size: 14px; }
        #fileInput { display: none; }
        .file-info { margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 6px; display: none; }
        .file-info.active { display: block; }
        .file-name { font-weight: 600; color: #333; margin-bottom: 5px; }
        .file-size { color: #666; font-size: 14px; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: all 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .result { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; }
        .result.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .result.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { margin-top: 20px; text-align: center; display: none; }
        .loading.active { display: block; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .preview { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 6px; display: none; }
        .preview.active { display: block; }
        .preview-title { font-weight: 600; margin-bottom: 10px; color: #333; }
        .preview-content { max-height: 200px; overflow-y: auto; background: white; padding: 10px; border-radius: 4px; font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📰 뉴스 JSON 가져오기</h1>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">JSON 파일을 드래그하거나 클릭하여 선택</div>
            <div class="upload-hint">news_english_guide_*.json 형식</div>
        </div>
        <input type="file" id="fileInput" accept=".json">

        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div class="file-size" id="fileSize"></div>
        </div>

        <div class="preview" id="preview">
            <div class="preview-title">파일 내용 미리보기:</div>
            <div class="preview-content" id="previewContent"></div>
        </div>

        <button id="uploadBtn" disabled>🚀 가져오기 시작</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>데이터 처리 중...</div>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const uploadBtn = document.getElementById('uploadBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const preview = document.getElementById('preview');
        const previewContent = document.getElementById('previewContent');

        let selectedFile = null;
        let jsonData = null;

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.name.endsWith('.json')) {
                showResult('error', 'JSON 파일만 업로드 가능합니다.');
                return;
            }

            selectedFile = file;
            fileInfo.classList.add('active');
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    jsonData = JSON.parse(e.target.result);

                    // Validate JSON structure
                    if (!jsonData.title || !Array.isArray(jsonData.content)) {
                        throw new Error('올바른 JSON 형식이 아닙니다.');
                    }

                    uploadBtn.disabled = false;

                    // Show preview
                    preview.classList.add('active');
                    previewContent.textContent = `제목: ${jsonData.title}\n기사 수: ${jsonData.content.length}개`;

                } catch (error) {
                    showResult('error', 'JSON 파싱 실패: ' + error.message);
                    uploadBtn.disabled = true;
                }
            };
            reader.readAsText(file);
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        uploadBtn.addEventListener('click', async () => {
            if (!jsonData) return;

            loading.classList.add('active');
            result.classList.remove('success', 'error');
            uploadBtn.disabled = true;

            try {
                const response = await fetch('/api/trends/import', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(jsonData)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    let message = `✅ 성공적으로 가져왔습니다!\n`;
                    message += `총 ${data.total}개 중 ${data.imported}개 완료`;

                    if (data.errors && data.errors.length > 0) {
                        message += `\n\n⚠️ 일부 오류 발생 (${data.errors.length}개):\n`;
                        data.errors.slice(0, 5).forEach(err => {
                            message += `- ${err.title || '알 수 없음'}: ${err.error || err.message}\n`;
                        });
                        if (data.errors.length > 5) {
                            message += `...외 ${data.errors.length - 5}개`;
                        }
                    }

                    showResult('success', message);
                } else {
                    showResult('error', '가져오기 실패: ' + (data.error || '알 수 없는 오류'));
                }

            } catch (error) {
                showResult('error', '서버 연결 실패: ' + error.message);
            } finally {
                loading.classList.remove('active');
                uploadBtn.disabled = false;
            }
        });

        function showResult(type, message) {
            result.className = 'result ' + type;
            result.textContent = message;
            result.style.display = 'block';
        }
    </script>
</body>
</html>
