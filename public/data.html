<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trend Eng - Data Management</title>
    <link rel="stylesheet" href="/style.css?v=7">
    <style>
        .admin-outer { max-width: 1000px; margin: 40px auto; }
        .admin-nav-bar { display: flex; background: #2c3e50; border-radius: 8px 8px 0 0; overflow: hidden; }
        .admin-nav-item { padding: 12px 22px; color: #bdc3c7; text-decoration: none; font-weight: 600; font-size: 14px; transition: all 0.2s; border-right: 1px solid rgba(255,255,255,0.07); }
        .admin-nav-item:hover { background: #34495e; color: #fff; }
        .admin-nav-item.active { background: #fff; color: #2c3e50; }
        .admin-container { padding: 25px; background: #fff; border-radius: 0 0 12px 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        .sub-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #f1f2f6; padding-bottom: 10px; }
        .sub-tab { padding: 8px 16px; cursor: pointer; border-radius: 6px; font-weight: bold; color: #7f8c8d; transition: all 0.2s; }
        .sub-tab.active { background: #3498db; color: white; }

        .btn-refresh { background: #3498db; color: white; border: none; padding: 10px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-refresh:hover { background: #2980b9; }

        .data-section { display: none; }
        .data-section.active { display: block; }

        .item-group { margin-bottom: 35px; border: 1px solid #eee; border-radius: 10px; overflow: hidden; }
        .item-header { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 12px 20px; border-bottom: 1px solid #eee; }
        .item-label { font-size: 16px; font-weight: 800; color: #2c3e50; }
        
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #fff; padding: 12px 15px; text-align: left; font-size: 12px; color: #95a5a6; text-transform: uppercase; border-bottom: 2px solid #f1f2f6; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f2f6; color: #2d3436; font-size: 14px; }
        td.col-title { white-space: normal !important; word-break: break-word !important; overflow: visible !important; text-overflow: clip !important; -webkit-line-clamp: unset !important; display: table-cell !important; }
        tr:hover { background-color: #f9f9f9; }

        .badge { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; color: white; display: inline-block; white-space: nowrap; max-width: 120px; overflow: hidden; text-overflow: ellipsis; vertical-align: middle; }
        .badge-news { background-color: #3498db; }
        .badge-song { background-color: #9b59b6; }
        .badge-tech { background-color: #3498db; }
        .badge-sports { background-color: #e67e22; }
        .badge-ent { background-color: #9b59b6; }
        .badge-economy { background-color: #2ecc71; }
        .badge-politics { background-color: #e74c3c; }
        .badge-default { background-color: #95a5a6; }
        .badge-date { background-color: #f1f2f6; color: #7f8c8d; border: 1px solid #dfe6e9; margin-left: 5px; }

        .btn-delete { background: none; color: #bdc3c7; border: 1px solid #ddd; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: all 0.2s; }
        .btn-delete:hover { color: #e74c3c; border-color: #e74c3c; background: #fff5f5; }
        
        .btn-clear-all { padding: 6px 14px; background: #fff; color: #e74c3c; border: 1px solid #fab1a0; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-clear-all:hover { background: #e74c3c; color: white; }

        .loading-spinner { text-align: center; padding: 50px; color: #3498db; font-weight: bold; }
        .empty-state { text-align: center; padding: 60px; color: #bdc3c7; font-size: 15px; }

        .sync-panel { background: #f8f9fa; border: 1px solid #e0e0ee; border-radius: 10px; padding: 18px 20px; margin-bottom: 20px; }
        .sync-panel-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .sync-panel-title { font-weight: 700; font-size: 15px; color: #2c3e50; }
        .sync-panel-desc { font-size: 12px; color: #7f8c8d; margin-top: 3px; }
        .btn-sync { background: #5b5bd6; color: white; border: none; padding: 9px 18px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; }
        .btn-sync:hover { opacity: 0.88; }
        .btn-sync:disabled { opacity: 0.5; cursor: not-allowed; }
        .sync-progress-bar { height: 4px; background: #e0e0ee; border-radius: 4px; margin-top: 12px; overflow: hidden; }
        .sync-progress-fill { height: 100%; background: #5b5bd6; border-radius: 4px; transition: width 0.4s; width: 0%; }
        .sync-status-text { font-size: 12px; color: #7f8c8d; margin: 6px 0 0; }
        .sync-result { margin-top: 10px; font-size: 13px; }
        .sync-result-success { background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 6px; padding: 12px 14px; color: #3730a3; }
        .sync-result-error { background: #fff5f5; border: 1px solid #fab1a0; border-radius: 6px; padding: 12px 14px; color: #c0392b; }
        .sync-counts { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .sync-count { background: white; border: 1px solid #c7d2fe; border-radius: 4px; padding: 3px 10px; font-size: 12px; color: #4338ca; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="admin-outer">
        <div class="admin-container">
            <div class="header-flex">
                <h1>📊 통합 데이터 관리</h1>
                <button onclick="refreshCurrentTab()" class="btn-refresh">🔄 새로고침</button>
            </div>

            <!-- 데이터 동기화 패널 -->
            <div class="sync-panel">
                <div class="sync-panel-header">
                    <div>
                        <div class="sync-panel-title">🔄 원격 데이터 동기화</div>
                        <div class="sync-panel-desc">https://minohlee.mooo.com의 최신 데이터를 가져옵니다. 중복 데이터는 자동으로 건너뜁니다.</div>
                    </div>
                    <button id="sync-btn" class="btn-sync">🔄 동기화</button>
                </div>
                <div id="sync-status" class="hidden">
                    <div class="sync-progress-bar"><div id="sync-progress-fill" class="sync-progress-fill"></div></div>
                    <p id="sync-status-text" class="sync-status-text">연결 중...</p>
                </div>
                <div id="sync-result" class="sync-result hidden"></div>
            </div>

            <div class="sub-tabs">
                <div class="sub-tab active" onclick="switchTab('politics')">🏛️ 정치</div>
                <div class="sub-tab" onclick="switchTab('tech')">💻 테크</div>
                <div class="sub-tab" onclick="switchTab('ent')">🎭 엔터</div>
            </div>

            <!-- 정치 섹션 -->
            <div id="politics-section" class="data-section active">
                <div id="politics-loading" class="loading-spinner" style="display:none;">정치 데이터를 불러오는 중...</div>
                <div id="politics-content"></div>
                <div id="politics-empty" class="empty-state" style="display:none;">저장된 정치 데이터가 없습니다.</div>
            </div>

            <!-- 테크 섹션 -->
            <div id="tech-section" class="data-section">
                <div id="tech-loading" class="loading-spinner" style="display:none;">테크 데이터를 불러오는 중...</div>
                <div id="tech-content"></div>
                <div id="tech-empty" class="empty-state" style="display:none;">저장된 테크 데이터가 없습니다.</div>
            </div>

            <!-- 엔터 섹션 -->
            <div id="ent-section" class="data-section">
                <div id="ent-loading" class="loading-spinner" style="display:none;">엔터 데이터를 불러오는 중...</div>
                <div id="ent-content"></div>
                <div id="ent-empty" class="empty-state" style="display:none;">저장된 엔터 데이터가 없습니다.</div>
            </div>
        </div>
    </div>

    <script>
        let adminApiKey = '';
        let currentTab = 'politics';

        const CATEGORY_MAP = {
            politics: { label: '🏛️ 정치', keywords: ['정치', 'Politics'] },
            tech:     { label: '💻 테크',  keywords: ['테크', 'Tech', '기술'] },
            ent:      { label: '🎭 엔터',  keywords: ['엔터', 'Entertainment', '연예', '문화'] }
        };

        async function getAdminKey() {
            try {
                const res = await fetch('/api/admin-key');
                const data = await res.json();
                adminApiKey = data.key || '';
            } catch (err) {}
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.sub-tab[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.querySelectorAll('.data-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`${tab}-section`).classList.add('active');
            refreshCurrentTab();
        }

        function refreshCurrentTab() {
            fetchByCategory(currentTab);
        }

        function matchCategory(itemCategory, tabKey) {
            const keywords = CATEGORY_MAP[tabKey].keywords;
            return keywords.some(k => (itemCategory || '').includes(k));
        }

        async function fetchByCategory(tabKey) {
            const contentEl = document.getElementById(`${tabKey}-content`);
            const loadingEl = document.getElementById(`${tabKey}-loading`);
            const emptyEl   = document.getElementById(`${tabKey}-empty`);

            contentEl.innerHTML = '';
            loadingEl.style.display = 'block';
            emptyEl.style.display = 'none';

            try {
                if (!adminApiKey) await getAdminKey();
                const response = await fetch('/api/trends/saved');
                const data = await response.json();
                loadingEl.style.display = 'none';

                const all = data.trends || [];
                const filtered = all.filter(item => matchCategory(item.category, tabKey));

                if (filtered.length === 0) {
                    emptyEl.style.display = 'block';
                    return;
                }

                const groups = {};
                filtered.forEach(item => {
                    const date = item.date || '날짜 미지정';
                    if (!groups[date]) groups[date] = [];
                    groups[date].push(item);
                });

                const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));
                sortedDates.forEach(date => {
                    const section = document.createElement('div');
                    section.className = 'item-group';
                    section.innerHTML = `
                        <div class="item-header">
                            <span class="item-label">📅 ${date}</span>
                            <button class="btn-clear-all" onclick="clearDateCategoryData('${date}', '${tabKey}')">이 날짜 일괄 삭제</button>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th style="width:50px;">ID</th>
                                    <th>기사 제목</th>
                                    <th style="width:60px; text-align:center;">작업</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${groups[date].map(item => `
                                    <tr>
                                        <td style="color:#bdc3c7; font-size:11px;">${item.id}</td>
                                        <td class="col-title" style="font-weight:600;">${item.title}</td>
                                        <td style="text-align:center;">
                                            <button class="btn-delete" onclick="deleteItem(${item.id}, '${tabKey}')">삭제</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                    contentEl.appendChild(section);
                });
            } catch (err) {
                loadingEl.innerHTML = `<span style="color:red">오류: ${err.message}</span>`;
            }
        }

        async function deleteItem(id, tabKey) {
            if (!confirm('삭제하시겠습니까?')) return;
            try {
                const response = await fetch(`/api/trends/${id}`, {
                    method: 'DELETE',
                    headers: { 'x-admin-key': adminApiKey }
                });
                const result = await response.json();
                if (result.success) fetchByCategory(tabKey);
            } catch (err) { window.showAlert('삭제 실패'); }
        }

        async function clearDateCategoryData(date, tabKey) {
            if (!confirm(`[경고] ${date}의 ${CATEGORY_MAP[tabKey].label} 데이터를 모두 삭제하시겠습니까?`)) return;
            try {
                const response = await fetch('/api/trends/saved');
                const data = await response.json();
                const targets = (data.trends || []).filter(item =>
                    (item.date || '날짜 미지정') === date && matchCategory(item.category, tabKey)
                );
                await Promise.all(targets.map(item =>
                    fetch(`/api/trends/${item.id}`, { method: 'DELETE', headers: { 'x-admin-key': adminApiKey } })
                ));
                window.showAlert(`${date} ${CATEGORY_MAP[tabKey].label} 데이터가 삭제되었습니다.`);
                fetchByCategory(tabKey);
            } catch (err) { window.showAlert('통신 오류: ' + err.message); }
        }

        // 데이터 동기화
        const syncBtn = document.getElementById('sync-btn');
        const syncStatus = document.getElementById('sync-status');
        const syncProgressFill = document.getElementById('sync-progress-fill');
        const syncStatusText = document.getElementById('sync-status-text');
        const syncResult = document.getElementById('sync-result');

        syncBtn.addEventListener('click', async () => {
            syncBtn.disabled = true;
            syncBtn.textContent = '동기화 중...';
            syncStatus.classList.remove('hidden');
            syncResult.classList.add('hidden');
            syncProgressFill.style.width = '0%';
            syncStatusText.textContent = 'https://minohlee.mooo.com에 연결 중...';

            let progress = 0;
            const progressInterval = setInterval(() => {
                if (progress < 85) { progress += 5; syncProgressFill.style.width = progress + '%'; }
            }, 400);

            try {
                const response = await fetch('/api/sync', { method: 'POST' });
                const contentType = response.headers.get('content-type') || '';
                if (!contentType.includes('application/json')) {
                    throw new Error(`서버 응답 오류 (${response.status}): 서버를 재시작해주세요.`);
                }
                const data = await response.json();

                clearInterval(progressInterval);
                syncProgressFill.style.width = '100%';

                if (data.success) {
                    const r = data.results;
                    const errMsg = r.errors && r.errors.length > 0
                        ? `<div style="margin-top:6px;font-size:11px;color:#c0392b;">⚠️ 오류: ${r.errors.join(', ')}</div>` : '';
                    syncResult.innerHTML = `
                        <div class="sync-result-success">
                            <strong>✅ 동기화 완료!</strong>
                            <div class="sync-counts">
                                <span class="sync-count">📰 뉴스 <b>${r.news}개</b> 추가</span>
                                <span class="sync-count">🎵 팝송 <b>${r.songs}개</b> 추가</span>
                                <span class="sync-count">🧩 퍼즐 <b>${r.puzzles}개</b> 추가</span>
                                <span class="sync-count">⏭️ 중복 <b>${r.skipped}개</b> 건너뜀</span>
                            </div>
                            ${errMsg}
                        </div>`;
                    syncStatusText.textContent = '동기화 완료!';
                    refreshCurrentTab();
                } else {
                    syncResult.innerHTML = `<div class="sync-result-error">❌ 동기화 실패: ${data.error}</div>`;
                    syncStatusText.textContent = '동기화 실패';
                }
                syncResult.classList.remove('hidden');
            } catch (error) {
                clearInterval(progressInterval);
                syncResult.innerHTML = `<div class="sync-result-error">❌ 오류: ${error.message}</div>`;
                syncResult.classList.remove('hidden');
                syncStatusText.textContent = '오류 발생';
            } finally {
                syncBtn.disabled = false;
                syncBtn.textContent = '🔄 동기화';
            }
        });

        window.onload = refreshCurrentTab;
    </script>
</body>
</html>
