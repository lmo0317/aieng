<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터 관리 - 트렌드 영어</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="settings.css">
    <style>
        .data-card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            text-align: left;
            margin-top: 1rem;
        }
        .data-info {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: var(--primary-light);
            border-radius: 12px;
            color: var(--primary);
            font-size: 0.95rem;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header-section">
            <div class="nav-links">
                <a href="/" class="nav-link">🏠 홈으로</a>
                <a href="/settings.html" class="nav-link">⚙️ 설정</a>
            </div>
        </div>

        <div class="settings-page-header">
            <h2>📊 데이터 관리</h2>
            <p>저장된 학습 콘텐츠를 관리합니다</p>
        </div>

        <!-- [관리 페이지] -->
        <div id="section-manage">
            <div class="data-card">
                <h3 style="margin-bottom: 1rem; color: #7c3aed;">🎶 저장된 팝송 관리</h3>
                <div id="manage-songs-list" style="display: flex; flex-direction: column; gap: 10px;">
                    <!-- 팝송 리스트가 동적으로 추가됨 -->
                    <p style="text-align: center; color: var(--text-muted); padding: 20px;">로딩 중...</p>
                </div>
            </div>

            <div class="data-card" style="margin-top: 2rem;">
                <h3 style="margin-bottom: 1rem; color: var(--primary);">📰 뉴스 트렌드 관리</h3>
                <div id="manage-trends-list" style="display: flex; flex-direction: column; gap: 10px;">
                    <!-- 뉴스 트렌드 리스트가 동적으로 추가됨 -->
                    <p style="text-align: center; color: var(--text-muted); padding: 20px;">로딩 중...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
</body>

</html>
