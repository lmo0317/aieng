<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trend Eng - 트렌드 맞춤형 영어 학습</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="header-section">
            <div class="nav-links">
                <a href="/" id="nav-home" class="nav-link">🏠 홈</a>
                <a href="#" id="nav-review" class="nav-link">📚 복습하기</a>
                <a href="/settings.html" class="settings-link">⚙️ 설정</a>
            </div>
        </div>
        <h1>Trend Eng 🤖</h1>
        <p>인공지능이 제안하는 트렌드 맞춤형 영어 학습 솔루션</p>

        <!-- 복습 섹션 -->
        <div id="review-section" class="hidden">
            <div class="section-header">
                <h2>나의 학습 히스토리</h2>
                <button id="back-to-main" class="home-btn">🏠 메인으로</button>
            </div>
            <div id="history-list" class="history-list">
                <!-- 히스토리 아이템이 여기에 생성됩니다 -->
                <div class="history-loading">불러오는 중...</div>
            </div>
        </div>

        <div id="setup-section">
            <div class="setup-container">
                <!-- 왼쪽: 입력 및 설정 영역 -->
                <div class="setup-left">
                    <div class="input-group topic-group">
                        <label for="topic">학습 주제 및 세부 내용</label>
                        <textarea id="topic" placeholder="학습하고 싶은 주제나 관련 기사 전문을 입력하세요. 상세할수록 더 정확한 문장이 생성됩니다." rows="8"></textarea>
                    </div>
                    <div class="input-group">
                        <label for="difficulty">학습 난이도 선택</label>
                        <select id="difficulty">
                            <option value="level1">Level 1 (입문)</option>
                            <option value="level2">Level 2 (초급)</option>
                            <option value="level3" selected>Level 3 (중급)</option>
                            <option value="level4">Level 4 (고급)</option>
                            <option value="level5">Level 5 (심화)</option>
                        </select>
                    </div>
                    <button id="start-btn" class="start-btn">학습 시작 🚀</button>
                </div>

                <!-- 오른쪽: 세로형 트랜드 리스트 영역 -->
                <div class="setup-right">
                    <div class="trends-header">
                        <span>🔥 실시간 트랜드 추천</span>
                    </div>
                    <div id="trends-container" class="trends-vertical-list">
                        <!-- 트랜드 카드들이 세로로 생성됩니다 -->
                        <div class="trends-loading">데이터를 불러오는 중...</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="learning-section" class="hidden">
            <div class="progress">오늘의 학습: <span id="current-count">0</span> / 10</div>
            <div id="content-card" class="card">
                <div class="english-container">
                    <div class="english-sentence" id="sentence-en">문장을 불러오는 중...</div>
                    <button id="tts-btn" class="tts-btn hidden" title="문장 읽기">🔊</button>
                </div>
                <div class="korean-sentence hidden" id="sentence-ko"></div>
                <div class="analysis-section hidden" id="analysis"></div>
                <div class="structure-section hidden" id="structure"></div>
                <div class="explanation-section hidden" id="explanation"></div>
                <div class="voca-section hidden" id="voca"></div>
            </div>
            <div class="controls">
                <button id="reveal-btn">정답 및 설명 보기</button>
                <button id="next-btn" class="hidden">다음 문장</button>
                <button id="finish-btn" class="hidden">오늘의 학습 완료!</button>
            </div>
        </div>
    </div>

    <!-- AI 음성 대화 버튼 -->
    <button id="ai-chat-btn" class="ai-chat-btn" aria-label="AI 음성 대화 시작">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
    </button>

    <!-- 채팅 모달 -->
    <div id="chat-modal" class="chat-modal hidden" role="dialog" aria-labelledby="chat-modal-title" aria-modal="true">
        <div class="chat-modal-overlay"></div>
        <div class="chat-modal-container">
            <div class="chat-modal-header">
                <h2 id="chat-modal-title">AI 음성 대화</h2>
                <button id="chat-close-btn" class="chat-close-btn" aria-label="대화창 닫기">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <div id="chat-messages" class="chat-messages" role="log" aria-live="polite">
                <div class="chat-welcome-message">
                    안녕하세요! 저는 AI 음성 대화 어시스턴트입니다.
                    <br><br>
                    마이크 버튼을 눌러 음성으로 대화하거나,
                    텍스트로 메시지를 입력하세요.
                </div>
            </div>

            <div class="chat-input-area">
                <div class="chat-status-indicator hidden" id="chat-status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text" id="chat-status-text">듣고 있는 중...</span>
                </div>
                <div class="chat-input-wrapper">
                    <input type="text" id="chat-input" class="chat-input" placeholder="메시지를 입력하세요..." aria-label="메시지 입력">
                    <button id="chat-mic-btn" class="chat-mic-btn" aria-label="음성 입력 시작" title="음성 입력">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>
                    <button id="chat-send-btn" class="chat-send-btn" aria-label="메시지 전송" title="전송">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="chat.js"></script>
</body>

</html>
