# Shorts Factory 설정

# 데이터베이스
db_path: "../../db/database.sqlite"

# 출력
output_dir: "output"

# ComfyUI
comfy:
  host: "127.0.0.1"
  port: 8188
  model: "flux1-schnell.safetensors"
  width: 608
  height: 1080
  steps: 4

# CogVideoX
cogvideox:
  model: "THUDM/CogVideoX-2b"
  num_frames: 49       # ~5초 @ 8fps
  fps: 8
  inference_steps: 25
  guidance_scale: 6.0
  fallback_kenburns: true  # CogVideoX 실패 시 Ken Burns 폴백

# Ollama
ollama:
  model: "qwen2.5:14b"
  temperature: 0.7

# CosyVoice2
tts:
  cosyvoice_path: "~/CosyVoice"
  model: "pretrained_models/CosyVoice2-0.5B"
  voice: "en-us"
  speed: 0.9
  fallback: "edge-tts"     # edge-tts 폴백

# 자산
assets:
  bgm_dir: "assets/bgm"
  default_bgm: "assets/bgm/cinematic_light.mp3"
  fonts:
    bold: "assets/fonts/Pretendard-Bold.ttf"
    regular: "assets/fonts/Pretendard-Regular.ttf"
    english: "assets/fonts/DMSans-Bold.ttf"

# 쇼츠 레이아웃
layout:
  resolution: "1080x1920"
  fps: 30
  title_y: "h*0.10"
  quote_y: "(h-text_h)/2 - 60"
  translation_y: "(h-text_h)/2 + 80"
  voca_y: "h*0.72"
  watermark: "Trend Eng"
  text_timings:
    title: 0.0
    quote: 1.5
    translation: 3.0
    voca: 5.0

# YouTube 업로드 (선택)
youtube:
  enabled: false
  secrets_file: "client_secrets.json"
  token_file: "youtube_token.json"
  privacy: "public"   # public / unlisted / private
